services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-banner_builder}
      POSTGRES_USER: ${POSTGRES_USER:-banner_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - banner_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-banner_user} -d ${POSTGRES_DB:-banner_builder}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    image: ghcr.io/darthvauban/baner-grid-builder:latest
    build: .
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-banner_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-banner_builder}
      DATABASE_SSL: "false"
      CATALOG_MEDIA_DIR: /app/storage/catalog-media
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - catalog_media_data:/app/storage/catalog-media
    depends_on:
      db:
        condition: service_healthy

volumes:
  banner_db_data:
  catalog_media_data:

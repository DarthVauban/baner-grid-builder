name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Sync deployment configuration
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: docker-compose.yml
          target: ${{ secrets.APP_DIR }}
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd ${{ secrets.APP_DIR }}
            REPOSITORY="$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
            IMAGE="$REPOSITORY:sha-${{ github.sha }}"
            LATEST="$REPOSITORY:latest"
            retry() {
              max_attempts="$1"
              delay_seconds="$2"
              shift 2
              attempt=1
              until "$@"; do
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "Registry command failed after $attempt attempts." >&2
                  return 1
                fi
                echo "Registry command failed (attempt $attempt/$max_attempts). Retrying in ${delay_seconds}s..." >&2
                sleep "$delay_seconds"
                attempt=$((attempt + 1))
                delay_seconds=$((delay_seconds * 2))
              done
            }
            login_ghcr() {
              printf '%s\n' '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            }
            retry 4 5 login_ghcr
            retry 5 10 docker pull "$IMAGE"
            EXPECTED_IMAGE_ID="$(docker image inspect "$IMAGE" --format '{{.Id}}')"
            docker tag "$IMAGE" "$LATEST"
            MEDIA_BACKUP="$(mktemp -d)"
            deployment_cleanup() {
              status="$1"
              trap - EXIT
              if [ "$status" -ne 0 ]; then
                echo "Deployment failed. Container diagnostics:" >&2
                docker compose ps >&2 || true
                docker compose logs --no-color --tail=120 db app >&2 || true
              fi
              rm -rf "$MEDIA_BACKUP"
              exit "$status"
            }
            trap 'deployment_cleanup $?' EXIT
            MIGRATE_LEGACY_MEDIA=false
            OLD_CONTAINER_ID="$(docker compose ps -q app || true)"
            if [ -n "$OLD_CONTAINER_ID" ]; then
              HAS_MEDIA_VOLUME="$(docker inspect "$OLD_CONTAINER_ID" --format '{{range .Mounts}}{{if eq .Destination "/app/storage/catalog-media"}}yes{{end}}{{end}}')"
              if [ "$HAS_MEDIA_VOLUME" != "yes" ]; then
                if docker exec "$OLD_CONTAINER_ID" test -d /tmp/mt-panel-catalog-media; then
                  docker cp "$OLD_CONTAINER_ID:/tmp/mt-panel-catalog-media/." "$MEDIA_BACKUP/"
                  MIGRATE_LEGACY_MEDIA=true
                elif docker exec "$OLD_CONTAINER_ID" test -d /app/storage/catalog-media; then
                  docker cp "$OLD_CONTAINER_ID:/app/storage/catalog-media/." "$MEDIA_BACKUP/"
                  MIGRATE_LEGACY_MEDIA=true
                fi
              fi
            fi
            docker compose up -d --no-build db
            DB_CONTAINER_ID="$(docker compose ps -q db)"
            test -n "$DB_CONTAINER_ID"
            DB_HEALTH="starting"
            for attempt in $(seq 1 12); do
              DB_HEALTH="$(docker inspect "$DB_CONTAINER_ID" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}')"
              if [ "$DB_HEALTH" = "healthy" ]; then
                break
              fi
              echo "PostgreSQL is $DB_HEALTH (attempt $attempt/12)." >&2
              sleep 5
            done
            test "$DB_HEALTH" = "healthy"
            docker compose up -d --no-build --force-recreate app
            docker compose ps app
            sleep 8
            CONTAINER_ID="$(docker compose ps -q app)"
            test -n "$CONTAINER_ID"
            MEDIA_MOUNT_TYPE="$(docker inspect "$CONTAINER_ID" --format '{{range .Mounts}}{{if eq .Destination "/app/storage/catalog-media"}}{{.Type}}{{end}}{{end}}')"
            test "$MEDIA_MOUNT_TYPE" = "volume"
            docker exec "$CONTAINER_ID" test -w /app/storage/catalog-media
            if [ "$MIGRATE_LEGACY_MEDIA" = "true" ]; then
              docker cp "$MEDIA_BACKUP/." "$CONTAINER_ID:/app/storage/catalog-media/"
              docker exec -u root "$CONTAINER_ID" chown -R nodeapp:nodeapp /app/storage/catalog-media
            fi
            RUNNING_IMAGE_ID="$(docker inspect "$CONTAINER_ID" --format '{{.Image}}')"
            test "$RUNNING_IMAGE_ID" = "$EXPECTED_IMAGE_ID"
            RUNNING_REVISION="$(docker inspect "$CONTAINER_ID" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
            test "$RUNNING_REVISION" = "${{ github.sha }}"
            HEALTH="$(curl -fsS http://127.0.0.1:3000/api/health)"
            echo "$HEALTH"
            grep -Fq '"buildSha":"${{ github.sha }}"' <<< "$HEALTH"
            STOREFRONT="$(curl -fsS http://127.0.0.1:3000/storefront)"
            grep -Fq 'id="storefront-root"' <<< "$STOREFRONT"
            grep -Fq '/web-assets/storefront-' <<< "$STOREFRONT"
            LOADER="$(curl -fsS http://127.0.0.1:3000/api/public/application-forms/loader.js)"
            grep -Fq "MTApplicationForms" <<< "$LOADER"
            docker image prune -f
